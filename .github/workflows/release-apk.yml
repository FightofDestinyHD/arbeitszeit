name: Release APK

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify APK exists
        shell: bash
        run: |
          if [ ! -f "dist/app-release.apk" ]; then
            echo "ERROR: dist/app-release.apk not found."
            echo "Please build the APK locally and commit it to dist/ before tagging."
            exit 1
          fi

      - name: Derive version metadata
        id: version
        shell: bash
        run: |
          TAG_VERSION=$(echo "$GITHUB_REF" | sed 's/refs\/tags\///')
          BUILD_NAME=$(echo "$TAG_VERSION" | sed 's/^[vV]//')
          MAJOR=$(echo "$BUILD_NAME" | cut -d. -f1)
          MINOR=$(echo "$BUILD_NAME" | cut -d. -f2)
          PATCH=$(echo "$BUILD_NAME" | cut -d. -f3)

          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}

          BUILD_NUMBER=$((MAJOR * 10000 + MINOR * 100 + PATCH))

          echo "tag_version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "build_name=$BUILD_NAME" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Generate update.json
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.tag_version }}"
          BUILD_NUMBER="${{ steps.version.outputs.build_number }}"
          APK_URL="https://github.com/${{ github.repository }}/releases/download/${VERSION}/app-release.apk"
          NOTES=$(git tag -l --format='%(contents)' $VERSION | head -n 1)
          echo "{\"version\": \"$VERSION\", \"build_number\": $BUILD_NUMBER, \"apk_url\": \"$APK_URL\", \"notes\": \"$NOTES\"}" > dist/update.json

      - name: Upload APK & update.json to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/app-release.apk
            dist/update.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
